<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="中南大学资源与安全工程学院实习互助平台，面向安全工程、采矿工程、城市地下空间工程学生提供实习指南、经验共享与岗位资源整理。">
    <title>CSU资安院实习互助平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        :root { --ink: #172033; --muted: #667085; --line: #d9e2ec; --brand: #1f6feb; --soft: #f5f8fc; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--ink);
            background: linear-gradient(180deg, #f7fbff 0%, #eef4f9 44%, #f8fafc 100%);
        }
        button, input, select, textarea { font: inherit; }
        .shell { max-width: 1180px; margin: 0 auto; padding: 0 20px; }
        .nav-glass { background: rgba(255,255,255,.92); border-bottom: 1px solid var(--line); backdrop-filter: blur(14px); }
        .surface { background: rgba(255,255,255,.94); border: 1px solid var(--line); box-shadow: 0 18px 45px -34px rgba(15,23,42,.45); }
        .hero { background: linear-gradient(135deg, #0f2f57 0%, #1464a5 48%, #1f7a70 100%); }
        .tab-active { color: #0f5fb5; border-bottom: 3px solid #0f5fb5; }
        .chip { border: 1px solid #dbe7f3; background: #f7fbff; color: #34516f; }
        .fade-in { animation: fadeIn .24s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .pdf-preview-container { width: 100%; height: 360px; border: 1px solid var(--line); border-radius: 10px; }
        .focus-ring:focus { outline: 3px solid rgba(31,111,235,.22); outline-offset: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useMemo, useState } = React;

        const supabaseUrl = 'https://lxlulmesfgwttwbfdvbz.supabase.co';
        const supabaseKey = 'sb_publishable_MY2XdBRVo8Lo-1cq-7OgAA_JXaPAlQ8';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const MAJORS = [
            {
                id: 'safety',
                label: '安全工程',
                short: '安全',
                tone: 'bg-blue-50 text-blue-700 border-blue-100',
                keywords: ['安全', 'EHS', 'HSE', '应急', '风险', '隐患', '消防', '职业健康', '双重预防', '安全评价', '安全工程'],
                tracks: ['制造业EHS', '新能源安全', '安全咨询', '施工安全', '应急管理'],
                skills: ['法规检索', '风险辨识', '事故案例复盘', '现场沟通', 'Excel/PowerBI']
            },
            {
                id: 'mining',
                label: '采矿工程',
                short: '采矿',
                tone: 'bg-amber-50 text-amber-800 border-amber-100',
                keywords: ['采矿', '矿山', '矿业', '通风', '爆破', '地压', '露天矿', '地下矿', '智能矿山', '矿井'],
                tracks: ['智能矿山', '矿山安全', '通风与爆破', '生产调度', '矿山数字化'],
                skills: ['CAD制图', 'Dimine/三维建模', '通风网络', '采矿方法', '现场记录']
            },
            {
                id: 'underground',
                label: '城市地下空间工程',
                short: '城地',
                tone: 'bg-emerald-50 text-emerald-800 border-emerald-100',
                keywords: ['地下空间', '隧道', '地铁', '盾构', '基坑', '岩土', 'BIM', '监测', '管廊', '地下工程'],
                tracks: ['盾构施工', '地铁工程', '基坑监测', 'BIM协同', '地下管廊'],
                skills: ['施工工法', '监测数据', 'BIM协同', '测量与制图', '项目文档']
            }
        ];

        const GUIDES = [
            { title: '实习准备路线', body: '先确定专业方向，再准备岗位关键词、项目故事和面试素材。建议把每一次课程设计、实验、竞赛和现场参观都整理成可复述的STAR案例。' },
            { title: '简历成熟度检查', body: '每段经历都要包含场景、任务、动作和结果。避免只写课程名，优先写工具、方法、产出和你解决的问题。' },
            { title: '面试表达框架', body: '准备3个专业案例、2个协作案例、1个失败复盘案例。面试中把“我学过”改成“我用它解决过什么”。' },
            { title: '投递节奏建议', body: '建立岗位看板，记录公司、岗位、城市、要求、投递状态和复盘结论。每周固定复盘简历命中率和面试反馈。' }
        ];

        const SOURCE_LIST = [
            { major: 'safety', name: '实习僧 - 安全工程实习', url: 'https://www.shixiseng.com/interns?keyword=%E5%AE%89%E5%85%A8%E5%B7%A5%E7%A8%8B' },
            { major: 'safety', name: '智联招聘 - EHS实习', url: 'https://sou.zhaopin.com/?kw=EHS%E5%AE%9E%E4%B9%A0' },
            { major: 'mining', name: '实习僧 - 采矿工程实习', url: 'https://www.shixiseng.com/interns?keyword=%E9%87%87%E7%9F%BF%E5%B7%A5%E7%A8%8B' },
            { major: 'mining', name: '智联招聘 - 矿山实习', url: 'https://sou.zhaopin.com/?kw=%E7%9F%BF%E5%B1%B1%E5%AE%9E%E4%B9%A0' },
            { major: 'underground', name: '实习僧 - 地下空间实习', url: 'https://www.shixiseng.com/interns?keyword=%E5%9C%B0%E4%B8%8B%E7%A9%BA%E9%97%B4%E5%B7%A5%E7%A8%8B' },
            { major: 'underground', name: '智联招聘 - 盾构/隧道实习', url: 'https://sou.zhaopin.com/?kw=%E7%9B%BE%E6%9E%84%20%E5%AE%9E%E4%B9%A0' }
        ];

        const FALLBACK_ITEMS = [
            { major: 'safety', title: 'EHS / HSE 实习：优先关注制造、新能源、化工、施工企业', source: '精选方向', url: 'https://www.shixiseng.com/interns?keyword=EHS%E5%AE%9E%E4%B9%A0', summary: '适合安全工程学生积累体系、隐患排查、培训和现场沟通经验。' },
            { major: 'safety', title: '安全评价 / 安全咨询助理：适合积累法规、报告和案例分析能力', source: '精选方向', url: 'https://sou.zhaopin.com/?kw=%E5%AE%89%E5%85%A8%E8%AF%84%E4%BB%B7%E5%AE%9E%E4%B9%A0', summary: '建议准备法规检索、事故案例复盘和报告写作样例。' },
            { major: 'mining', title: '智能矿山 / 矿业数字化实习：关注建模、调度与安全监测', source: '精选方向', url: 'https://www.shixiseng.com/interns?keyword=%E6%99%BA%E8%83%BD%E7%9F%BF%E5%B1%B1', summary: '适合采矿工程学生展示CAD、三维建模和现场理解能力。' },
            { major: 'mining', title: '矿山安全与生产技术助理：适合暑期现场实践', source: '精选方向', url: 'https://sou.zhaopin.com/?kw=%E9%87%87%E7%9F%BF%E5%B7%A5%E7%A8%8B%E5%AE%9E%E4%B9%A0', summary: '投递前建议补齐通风、爆破、地压、安全管理相关案例。' },
            { major: 'underground', title: '盾构 / 隧道 / 地铁工程实习：关注施工、监测和资料管理', source: '精选方向', url: 'https://www.shixiseng.com/interns?keyword=%E7%9B%BE%E6%9E%84%E5%AE%9E%E4%B9%A0', summary: '适合城市地下空间工程学生积累项目现场与BIM协同经验。' },
            { major: 'underground', title: '基坑监测 / 岩土工程助理：适合建立数据与工程判断能力', source: '精选方向', url: 'https://sou.zhaopin.com/?kw=%E5%9F%BA%E5%9D%91%E7%9B%91%E6%B5%8B%E5%AE%9E%E4%B9%A0', summary: '建议准备监测曲线理解、施工日志和风险预警表达。' }
        ];

        const escapeReg = (text) => text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const majorById = (id) => MAJORS.find(item => item.id === id) || MAJORS[0];
        const normalize = (value) => (value || '').toString();

        const classifyMajor = (post) => {
            const text = [post.major, post.title, post.content, post.author].map(normalize).join(' ').toLowerCase();
            const direct = MAJORS.find(major => text.includes(major.id) || text.includes(major.label.toLowerCase()));
            if (direct) return direct.id;
            const scored = MAJORS.map(major => ({
                id: major.id,
                score: major.keywords.reduce((sum, word) => sum + (text.includes(word.toLowerCase()) ? 1 : 0), 0)
            })).sort((a, b) => b.score - a.score);
            return scored[0].score > 0 ? scored[0].id : 'safety';
        };

        const inferPostType = (post) => {
            const text = [post.title, post.content].map(normalize).join(' ');
            if (/面试|面经|hr|群面|终面|一面|二面/i.test(text)) return '面试经验';
            if (/简历|作品集|自我介绍|STAR/i.test(text)) return '简历准备';
            if (/岗位|招聘|投递|内推|实习僧|boss|智联|公司/i.test(text)) return '岗位情报';
            if (/避坑|建议|复盘|总结|经验/i.test(text)) return '经验复盘';
            return '综合讨论';
        };

        const renderContentWithLinks = (text) => {
            if (!text) return null;
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.split(urlRegex).map((part, i) => {
                if (part.match(urlRegex)) return <a key={i} href={part} target="_blank" rel="noopener noreferrer" className="text-blue-700 hover:underline font-semibold break-all">{part}</a>;
                return part;
            });
        };

        function App() {
            const [view, setView] = useState('dashboard');
            const [posts, setPosts] = useState([]);
            const [loadingPosts, setLoadingPosts] = useState(true);
            const [postQuery, setPostQuery] = useState('');
            const [activeMajor, setActiveMajor] = useState('all');
            const [activeType, setActiveType] = useState('all');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [uploadedImg, setUploadedImg] = useState(null);
            const [uploadedPdf, setUploadedPdf] = useState(null);
            const [activeCommentPostId, setActiveCommentPostId] = useState(null);
            const [commentText, setCommentText] = useState('');
            const [commentAuthor, setCommentAuthor] = useState('');
            const [radarItems, setRadarItems] = useState(FALLBACK_ITEMS);
            const [radarStatus, setRadarStatus] = useState('standby');
            const [lastScan, setLastScan] = useState('未抓取');

            useEffect(() => { fetchPosts(); }, []);

            const enrichedPosts = useMemo(() => posts.map(post => ({
                ...post,
                _major: classifyMajor(post),
                _type: inferPostType(post)
            })), [posts]);

            const postTypes = useMemo(() => ['all', ...Array.from(new Set(enrichedPosts.map(post => post._type)))], [enrichedPosts]);

            const filteredPosts = enrichedPosts.filter(post => {
                const blob = [post.title, post.content, post.author, post._type, majorById(post._major).label].join(' ').toLowerCase();
                const queryMatch = !postQuery || blob.includes(postQuery.toLowerCase());
                const majorMatch = activeMajor === 'all' || post._major === activeMajor;
                const typeMatch = activeType === 'all' || post._type === activeType;
                return queryMatch && majorMatch && typeMatch;
            });

            const dashboard = useMemo(() => {
                const totalComments = enrichedPosts.reduce((sum, post) => sum + ((post.comments && post.comments.length) || 0), 0);
                const totalLikes = enrichedPosts.reduce((sum, post) => sum + (post.likes || 0), 0);
                const majors = MAJORS.map(major => ({ ...major, count: enrichedPosts.filter(post => post._major === major.id).length }));
                const latest = [...enrichedPosts].sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)).slice(0, 4);
                return { total: enrichedPosts.length, totalComments, totalLikes, majors, latest };
            }, [enrichedPosts]);

            async function fetchPosts() {
                setLoadingPosts(true);
                const { data, error } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
                if (!error && data) setPosts(data);
                setLoadingPosts(false);
            }

            function handleFileUpload(e, type) {
                const file = e.target.files[0];
                if (!file) return;
                if (type === 'image') {
                    if (file.size > 4 * 1024 * 1024) return alert('图片建议控制在4MB以内，便于公开页面快速加载。');
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const maxWidth = 1000;
                            let width = img.width;
                            let height = img.height;
                            if (width > maxWidth) { height = Math.round(height * maxWidth / width); width = maxWidth; }
                            canvas.width = width;
                            canvas.height = height;
                            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                            setUploadedImg(canvas.toDataURL('image/jpeg', 0.68));
                            setUploadedPdf(null);
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
                if (type === 'pdf') {
                    if (file.size > 900 * 1024) return alert('PDF请控制在900KB以内。公开平台建议上传精简版材料。');
                    const reader = new FileReader();
                    reader.onload = (event) => { setUploadedPdf({ name: file.name, data: event.target.result }); setUploadedImg(null); };
                    reader.readAsDataURL(file);
                }
            }

            async function handlePost(e) {
                e.preventDefault();
                const formData = new FormData(e.target);
                const title = formData.get('title').trim();
                const content = formData.get('content').trim();
                if (title.length < 6 || content.length < 20) return alert('为了方便后续同学检索，标题至少6字，正文至少20字。');
                const payload = {
                    title,
                    major: formData.get('major'),
                    author: formData.get('author') || '匿名同学',
                    content,
                    image: uploadedImg,
                    pdf: uploadedPdf,
                    likes: 0,
                    comments: []
                };
                const { error } = await supabase.from('posts').insert([payload]);
                if (error) return alert('发布失败，请稍后再试，或检查附件大小。');
                setIsModalOpen(false);
                setUploadedImg(null);
                setUploadedPdf(null);
                fetchPosts();
            }

            async function handleLike(id) {
                const post = posts.find(item => item.id === id);
                if (!post) return;
                await supabase.from('posts').update({ likes: (post.likes || 0) + 1 }).eq('id', id);
                fetchPosts();
            }

            async function submitComment(postId) {
                if (!commentText.trim()) return;
                const post = posts.find(item => item.id === postId);
                if (!post) return;
                const newComment = { id: Date.now().toString(), author: commentAuthor || '热心同学', text: commentText.trim() };
                await supabase.from('posts').update({ comments: [...(post.comments || []), newComment] }).eq('id', postId);
                setCommentText('');
                setCommentAuthor('');
                setActiveCommentPostId(null);
                fetchPosts();
            }

            async function scanInternshipSources() {
                setRadarStatus('loading');
                const fetched = [];
                for (const source of SOURCE_LIST) {
                    try {
                        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(source.url);
                        const response = await fetch(proxyUrl, { cache: 'no-store' });
                        if (!response.ok) throw new Error('source unavailable');
                        const html = await response.text();
                        const doc = new DOMParser().parseFromString(html, 'text/html');
                        const anchors = Array.from(doc.querySelectorAll('a')).slice(0, 160);
                        const major = majorById(source.major);
                        anchors.forEach(anchor => {
                            const title = (anchor.innerText || anchor.textContent || '').replace(/\s+/g, ' ').trim();
                            if (title.length < 8 || title.length > 80) return;
                            const hasInternship = /实习|校招|管培|助理|intern/i.test(title);
                            const hasMajor = major.keywords.some(word => title.toLowerCase().includes(word.toLowerCase()));
                            if (!hasInternship && !hasMajor) return;
                            const href = anchor.getAttribute('href');
                            let url = source.url;
                            try { url = new URL(href || source.url, source.url).href; } catch {}
                            fetched.push({ major: source.major, title, source: source.name, url, summary: '由资源雷达从公开招聘页面提取，请打开原网页确认岗位时效与要求。' });
                        });
                    } catch (error) {
                        fetched.push({ major: source.major, title: source.name + '：打开实时搜索结果', source: '抓取受限时的保底入口', url: source.url, summary: '该来源可能限制跨站抓取，已保留搜索入口供手动核验。' });
                    }
                }
                const unique = [];
                const seen = new Set();
                [...fetched, ...FALLBACK_ITEMS].forEach(item => {
                    const key = item.major + item.title;
                    if (!seen.has(key)) { seen.add(key); unique.push(item); }
                });
                setRadarItems(unique.slice(0, 24));
                setRadarStatus('ready');
                setLastScan(new Date().toLocaleString());
            }

            function NavButton({ id, label }) {
                return <button onClick={() => setView(id)} className={`h-16 px-2 sm:px-3 text-sm font-bold border-b-2 border-transparent transition ${view === id ? 'tab-active' : 'text-slate-500 hover:text-slate-900'}`}>{label}</button>;
            }

            function MajorBadge({ id }) {
                const major = majorById(id);
                return <span className={`inline-flex items-center rounded-full border px-2.5 py-1 text-xs font-bold ${major.tone}`}>{major.label}</span>;
            }

            function DashboardView() {
                return <div className="fade-in space-y-6">
                    <section className="hero rounded-[28px] p-6 md:p-9 text-white overflow-hidden">
                        <div className="grid lg:grid-cols-[1.5fr_.9fr] gap-8 items-center">
                            <div>
                                <p className="text-sm font-bold text-blue-100 mb-3">CSU Internship Hub</p>
                                <h1 className="text-3xl md:text-5xl font-extrabold leading-tight">资安院实习互助全景平台</h1>
                                <p className="mt-4 text-blue-50 leading-relaxed max-w-2xl">面向安全工程、采矿工程、城市地下空间工程三个专业，整合实习指南、同伴经验、岗位线索和准备路径，让信息从“零散聊天”沉淀为可复用的学生知识库。</p>
                                <div className="mt-6 flex flex-wrap gap-3">
                                    <button onClick={() => setView('community')} className="rounded-xl bg-white text-slate-900 px-5 py-3 font-bold hover:bg-blue-50 focus-ring">进入社区</button>
                                    <button onClick={() => { setView('radar'); scanInternshipSources(); }} className="rounded-xl bg-white/12 border border-white/25 px-5 py-3 font-bold hover:bg-white/20 focus-ring">抓取岗位资源</button>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <div className="rounded-2xl bg-white/12 p-4 border border-white/15"><p className="text-3xl font-extrabold">{dashboard.total}</p><p className="text-sm text-blue-100">社区帖子</p></div>
                                <div className="rounded-2xl bg-white/12 p-4 border border-white/15"><p className="text-3xl font-extrabold">{dashboard.totalLikes}</p><p className="text-sm text-blue-100">累计赞同</p></div>
                                <div className="rounded-2xl bg-white/12 p-4 border border-white/15"><p className="text-3xl font-extrabold">{dashboard.totalComments}</p><p className="text-sm text-blue-100">评论互动</p></div>
                                <div className="rounded-2xl bg-white/12 p-4 border border-white/15"><p className="text-3xl font-extrabold">3</p><p className="text-sm text-blue-100">专业方向</p></div>
                            </div>
                        </div>
                    </section>

                    <section className="grid md:grid-cols-3 gap-4">
                        {dashboard.majors.map(major => <div key={major.id} className="surface rounded-2xl p-5">
                            <div className="flex justify-between items-center mb-4"><MajorBadge id={major.id} /><span className="text-sm text-slate-500">{major.count} 条经验</span></div>
                            <h3 className="font-extrabold text-lg mb-3">{major.label}实习路径</h3>
                            <div className="flex flex-wrap gap-2 mb-4">{major.tracks.map(track => <span key={track} className="chip rounded-full px-2.5 py-1 text-xs font-semibold">{track}</span>)}</div>
                            <p className="text-sm text-slate-500 leading-relaxed">建议能力：{major.skills.join(' / ')}</p>
                        </div>)}
                    </section>

                    <section className="grid lg:grid-cols-[1fr_.85fr] gap-5">
                        <div className="surface rounded-2xl p-5">
                            <div className="flex items-center justify-between mb-4"><h2 className="text-xl font-extrabold">最新社区经验</h2><button onClick={() => setView('community')} className="text-sm font-bold text-blue-700">查看全部</button></div>
                            <div className="space-y-3">
                                {loadingPosts ? <p className="text-sm text-slate-500">正在读取社区内容...</p> : dashboard.latest.length === 0 ? <p className="text-sm text-slate-500">还没有帖子，适合先发布第一篇实习经验或岗位线索。</p> : dashboard.latest.map(post => <div key={post.id} className="rounded-xl border border-slate-100 p-4 bg-slate-50/60">
                                    <div className="flex flex-wrap gap-2 items-center mb-2"><MajorBadge id={post._major} /><span className="text-xs font-bold text-slate-500">{post._type}</span></div>
                                    <h3 className="font-bold line-clamp-2">{post.title}</h3>
                                    <p className="text-sm text-slate-500 mt-1 line-clamp-2">{post.content}</p>
                                </div>)}
                            </div>
                        </div>
                        <div className="surface rounded-2xl p-5">
                            <h2 className="text-xl font-extrabold mb-4">发布前质量标准</h2>
                            <div className="space-y-3 text-sm text-slate-600 leading-relaxed">
                                <p><strong>1. 标题清楚：</strong>包含岗位、公司类型或专业关键词。</p>
                                <p><strong>2. 内容可复用：</strong>写清背景、过程、结果和建议。</p>
                                <p><strong>3. 链接可核验：</strong>外部岗位或资料请附原始链接。</p>
                                <p><strong>4. 注意隐私：</strong>不要上传身份证、手机号、邮箱、合同等敏感信息。</p>
                            </div>
                        </div>
                    </section>
                </div>;
            }

            function GuideView() {
                return <div className="fade-in space-y-6">
                    <div className="grid md:grid-cols-3 gap-4">
                        {MAJORS.map(major => <div key={major.id} className="surface rounded-2xl p-5">
                            <MajorBadge id={major.id} />
                            <h2 className="font-extrabold text-xl mt-4 mb-3">{major.label}</h2>
                            <p className="text-sm text-slate-500 leading-relaxed mb-4">适合重点关注：{major.tracks.join('、')}。</p>
                            <div className="space-y-2">{major.skills.map(skill => <div key={skill} className="rounded-lg bg-slate-50 border border-slate-100 px-3 py-2 text-sm font-semibold text-slate-600">{skill}</div>)}</div>
                        </div>)}
                    </div>
                    <div className="surface rounded-2xl p-5">
                        <h2 className="text-xl font-extrabold mb-4">从迷茫到投递的四步路线</h2>
                        <div className="grid md:grid-cols-4 gap-4">
                            {GUIDES.map((guide, index) => <div key={guide.title} className="rounded-xl bg-slate-50 border border-slate-100 p-4">
                                <p className="text-sm font-extrabold text-blue-700 mb-2">Step {index + 1}</p>
                                <h3 className="font-bold mb-2">{guide.title}</h3>
                                <p className="text-sm text-slate-500 leading-relaxed">{guide.body}</p>
                            </div>)}
                        </div>
                    </div>
                </div>;
            }

            function CommunityView() {
                return <div className="fade-in grid lg:grid-cols-[1fr_310px] gap-6 items-start">
                    <div className="space-y-4">
                        <div className="surface rounded-2xl p-5">
                            <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
                                <div><h2 className="text-2xl font-extrabold">社区广场</h2><p className="text-sm text-slate-500 mt-1">帖子会自动按三大专业和内容类型归类。</p></div>
                                <button onClick={() => setIsModalOpen(true)} className="rounded-xl bg-blue-700 text-white px-5 py-3 font-bold hover:bg-blue-800 focus-ring">发布实习经验</button>
                            </div>
                            <input value={postQuery} onChange={e => setPostQuery(e.target.value)} placeholder="搜索岗位、公司、专业、面试、简历、关键词..." className="focus-ring w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none" />
                            <div className="mt-4 flex flex-wrap gap-2">
                                <button onClick={() => setActiveMajor('all')} className={`rounded-full px-3 py-1.5 text-sm font-bold border ${activeMajor === 'all' ? 'bg-slate-900 text-white border-slate-900' : 'chip'}`}>全部专业</button>
                                {MAJORS.map(major => <button key={major.id} onClick={() => setActiveMajor(major.id)} className={`rounded-full px-3 py-1.5 text-sm font-bold border ${activeMajor === major.id ? 'bg-slate-900 text-white border-slate-900' : 'chip'}`}>{major.label}</button>)}
                            </div>
                            <div className="mt-3 flex flex-wrap gap-2">
                                {postTypes.map(type => <button key={type} onClick={() => setActiveType(type)} className={`rounded-full px-3 py-1.5 text-xs font-bold border ${activeType === type ? 'bg-blue-700 text-white border-blue-700' : 'chip'}`}>{type === 'all' ? '全部类型' : type}</button>)}
                            </div>
                        </div>

                        {loadingPosts ? <div className="surface rounded-2xl p-8 text-center text-slate-500">正在读取帖子...</div> : filteredPosts.length === 0 ? <div className="surface rounded-2xl p-10 text-center"><h3 className="font-extrabold text-lg">暂时没有匹配内容</h3><p className="text-sm text-slate-500 mt-2">可以换个关键词，或发布一篇新的实习经验。</p></div> : filteredPosts.map(post => <PostCard key={post.id} post={post} />)}
                    </div>

                    <aside className="space-y-4 lg:sticky lg:top-24">
                        <div className="surface rounded-2xl p-5">
                            <h3 className="font-extrabold mb-3">三专业内容概览</h3>
                            <div className="space-y-3">{dashboard.majors.map(major => <button key={major.id} onClick={() => setActiveMajor(major.id)} className="w-full text-left rounded-xl border border-slate-100 bg-slate-50 px-4 py-3 hover:bg-white">
                                <div className="flex justify-between text-sm font-bold"><span>{major.label}</span><span>{major.count}</span></div>
                            </button>)}</div>
                        </div>
                        <div className="surface rounded-2xl p-5">
                            <h3 className="font-extrabold mb-3">推荐发帖模板</h3>
                            <p className="text-sm text-slate-500 leading-relaxed">岗位背景 -> 申请过程 -> 面试问题 -> 准备材料 -> 结果反馈 -> 给后来者的建议。</p>
                        </div>
                    </aside>
                </div>;
            }

            function PostCard({ post }) {
                return <article className="surface rounded-2xl p-5">
                    <div className="flex flex-wrap items-center gap-2 mb-3"><MajorBadge id={post._major} /><span className="rounded-full bg-slate-100 text-slate-600 px-2.5 py-1 text-xs font-bold">{post._type}</span><span className="text-xs text-slate-400">{post.created_at ? new Date(post.created_at).toLocaleString() : '刚刚'}</span></div>
                    <h3 className="text-xl font-extrabold mb-2">{post.title}</h3>
                    <p className="text-sm text-slate-500 mb-4">发布者：{post.author || '匿名同学'}</p>
                    <div className="text-slate-700 text-sm leading-relaxed whitespace-pre-wrap mb-4">{renderContentWithLinks(post.content)}</div>
                    {post.image && <img src={post.image} alt="帖子配图" className="mb-4 max-h-80 rounded-xl border border-slate-100 object-contain" />}
                    {post.pdf && <div className="mb-4"><div className="mb-2 text-sm font-bold text-slate-600">附件：<a className="text-blue-700 underline" href={post.pdf.data} download={post.pdf.name}>{post.pdf.name}</a></div><iframe src={post.pdf.data} className="pdf-preview-container"></iframe></div>}
                    <div className="border-t border-slate-100 pt-4 flex gap-4">
                        <button onClick={() => handleLike(post.id)} className="text-sm font-bold text-slate-500 hover:text-blue-700">赞同 {post.likes || 0}</button>
                        <button onClick={() => setActiveCommentPostId(activeCommentPostId === post.id ? null : post.id)} className="text-sm font-bold text-slate-500 hover:text-blue-700">评论 {(post.comments && post.comments.length) || 0}</button>
                    </div>
                    {post.comments && post.comments.length > 0 && <div className="mt-4 rounded-xl bg-slate-50 border border-slate-100 p-3 space-y-2">{post.comments.map(comment => <p key={comment.id} className="text-sm"><strong>{comment.author}：</strong>{comment.text}</p>)}</div>}
                    {activeCommentPostId === post.id && <div className="mt-4 rounded-xl bg-slate-50 border border-slate-100 p-3 space-y-2">
                        <input value={commentAuthor} onChange={e => setCommentAuthor(e.target.value)} placeholder="昵称（可选）" className="focus-ring w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none" />
                        <div className="flex gap-2"><input value={commentText} onChange={e => setCommentText(e.target.value)} placeholder="补充建议、追问或反馈..." className="focus-ring flex-1 rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none" /><button onClick={() => submitComment(post.id)} className="rounded-lg bg-blue-700 px-4 py-2 text-sm font-bold text-white">发送</button></div>
                    </div>}
                </article>;
            }

            function RadarView() {
                const groupedRadar = MAJORS.map(major => ({ ...major, items: radarItems.filter(item => item.major === major.id) }));
                return <div className="fade-in space-y-5">
                    <div className="surface rounded-2xl p-5 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                        <div><h2 className="text-2xl font-extrabold">实习资源雷达</h2><p className="text-sm text-slate-500 mt-1">自动抓取公开招聘页面的岗位标题和链接，并按三个专业整理。抓取结果需以原网站为准。</p></div>
                        <button onClick={scanInternshipSources} disabled={radarStatus === 'loading'} className="rounded-xl bg-blue-700 text-white px-5 py-3 font-bold hover:bg-blue-800 disabled:opacity-60 focus-ring">{radarStatus === 'loading' ? '正在抓取...' : '抓取最新资源'}</button>
                    </div>
                    <div className="text-sm text-slate-500">上次整理：{lastScan}</div>
                    <div className="grid lg:grid-cols-3 gap-4">
                        {groupedRadar.map(group => <section key={group.id} className="surface rounded-2xl p-5">
                            <div className="flex items-center justify-between mb-4"><MajorBadge id={group.id} /><span className="text-sm text-slate-500">{group.items.length} 条</span></div>
                            <div className="space-y-3">{group.items.map((item, index) => <a key={item.title + index} href={item.url} target="_blank" rel="noopener noreferrer" className="block rounded-xl border border-slate-100 bg-slate-50 p-4 hover:bg-white hover:border-blue-200">
                                <p className="font-bold text-slate-900 line-clamp-2">{item.title}</p>
                                <p className="text-xs text-slate-400 mt-2">{item.source}</p>
                                <p className="text-sm text-slate-500 mt-2 line-clamp-3">{item.summary}</p>
                            </a>)}</div>
                        </section>)}
                    </div>
                    <div className="surface rounded-2xl p-5 text-sm text-slate-600 leading-relaxed">
                        <strong>发布级说明：</strong>由于静态网站无法稳定绕过所有招聘网站的反爬与跨站限制，资源雷达会优先尝试实时抓取；若某来源限制访问，则自动保留原站搜索入口，确保用户仍能进入公开页面核验岗位时效。
                    </div>
                </div>;
            }

            function PostModal() {
                return <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 p-4 backdrop-blur-sm">
                    <div className="surface w-full max-w-2xl rounded-2xl overflow-hidden">
                        <div className="flex items-center justify-between border-b border-slate-100 p-5"><h2 className="text-xl font-extrabold">发布实习经验</h2><button onClick={() => setIsModalOpen(false)} className="text-2xl text-slate-400 hover:text-slate-800">×</button></div>
                        <form onSubmit={handlePost} className="p-5 space-y-4">
                            <input name="title" required placeholder="标题：如 新能源企业EHS实习一面复盘" className="focus-ring w-full rounded-xl border border-slate-200 px-4 py-3 outline-none" />
                            <div className="grid md:grid-cols-2 gap-3">
                                <select name="major" className="focus-ring rounded-xl border border-slate-200 px-4 py-3 outline-none">{MAJORS.map(major => <option key={major.id} value={major.id}>{major.label}</option>)}</select>
                                <input name="author" placeholder="昵称 / 年级（可选）" className="focus-ring rounded-xl border border-slate-200 px-4 py-3 outline-none" />
                            </div>
                            <textarea name="content" required rows="6" placeholder="建议包含：岗位背景、投递方式、准备材料、面试问题、结果反馈、给后来者的建议。可直接粘贴公开链接。" className="focus-ring w-full rounded-xl border border-slate-200 px-4 py-3 outline-none resize-none"></textarea>
                            <div className="rounded-xl border border-slate-200 bg-slate-50 p-4">
                                <p className="text-sm font-bold text-slate-600 mb-3">附件（二选一，公开发布前请去除个人隐私）</p>
                                <div className="grid md:grid-cols-2 gap-3">
                                    <label className="cursor-pointer rounded-xl border border-dashed border-slate-300 bg-white p-4 text-center text-sm font-bold text-slate-600 hover:border-blue-300">上传图片<input type="file" accept="image/*" className="hidden" onChange={(e) => handleFileUpload(e, 'image')} /></label>
                                    <label className="cursor-pointer rounded-xl border border-dashed border-slate-300 bg-white p-4 text-center text-sm font-bold text-slate-600 hover:border-blue-300">上传PDF<input type="file" accept="application/pdf" className="hidden" onChange={(e) => handleFileUpload(e, 'pdf')} /></label>
                                </div>
                                {(uploadedImg || uploadedPdf) && <p className="mt-3 text-sm text-blue-700 font-bold">附件已就绪。<button type="button" onClick={() => { setUploadedImg(null); setUploadedPdf(null); }} className="ml-2 underline">移除</button></p>}
                            </div>
                            <button type="submit" className="w-full rounded-xl bg-blue-700 px-5 py-3 font-bold text-white hover:bg-blue-800 focus-ring">发布到社区</button>
                        </form>
                    </div>
                </div>;
            }

            return <div className="min-h-screen">
                <header className="nav-glass sticky top-0 z-50">
                    <div className="shell flex h-16 items-center justify-between">
                        <button onClick={() => setView('dashboard')} className="text-left"><p className="text-base font-extrabold text-slate-900">资安实习互助平台</p><p className="text-xs text-slate-500">Safety · Mining · Underground Space</p></button>
                        <nav className="flex gap-2"><NavButton id="dashboard" label="首页" /><NavButton id="guide" label="指南" /><NavButton id="community" label="社区" /><NavButton id="radar" label="资源雷达" /></nav>
                    </div>
                </header>
                <main className="shell py-8">
                    {view === 'dashboard' && <DashboardView />}
                    {view === 'guide' && <GuideView />}
                    {view === 'community' && <CommunityView />}
                    {view === 'radar' && <RadarView />}
                </main>
                <footer className="shell pb-8 text-center text-xs text-slate-400">CSU Internship Hub · 学生互助原型平台 · 请以招聘原网站信息为准</footer>
                {isModalOpen && <PostModal />}
            </div>;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
