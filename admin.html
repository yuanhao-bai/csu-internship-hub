<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="大白维护台，用于维护资安实习互助站的内容、用户资料和登录记录。" />
  <title>大白维护台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:#172033; background:#f5f7fb; }
    button,input { font:inherit; }
    .shell { max-width:1180px; margin:0 auto; padding:0 20px; }
    .surface { background:#fff; border:1px solid #d9e2ec; box-shadow:0 18px 50px -42px rgba(15,23,42,.55); }
    .focus-ring:focus { outline:3px solid rgba(23,105,170,.22); outline-offset:2px; }
    .tab-active { color:#0f5fb5; border-bottom-color:#0f5fb5; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const supabase = window.supabase.createClient(
      'https://lxlulmesfgwttwbfdvbz.supabase.co',
      'sb_publishable_MY2XdBRVo8Lo-1cq-7OgAA_JXaPAlQ8'
    );

    function App() {
      const [session, setSession] = useState(null);
      const [email, setEmail] = useState('');
      const [message, setMessage] = useState('');
      const [tab, setTab] = useState('overview');
      const [feed, setFeed] = useState(null);
      const [profiles, setProfiles] = useState([]);
      const [logins, setLogins] = useState([]);
      const [posts, setPosts] = useState([]);
      const [errors, setErrors] = useState({});
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        supabase.auth.getSession().then(({ data }) => {
          setSession(data.session || null);
          if (data.session) refreshAll(data.session, true);
        });
        const { data: listener } = supabase.auth.onAuthStateChange((_event, nextSession) => {
          setSession(nextSession);
          if (nextSession) refreshAll(nextSession, true);
        });
        return () => listener.subscription.unsubscribe();
      }, []);

      async function signIn(e) {
        e.preventDefault();
        setMessage('正在发送登录邮件...');
        const { error } = await supabase.auth.signInWithOtp({
          email,
          options: { emailRedirectTo: window.location.href }
        });
        setMessage(error ? '发送失败，请确认 Supabase Auth 邮箱登录已开启。' : '登录链接已发送到邮箱，请打开邮件完成登录。');
      }

      async function signOut() {
        await supabase.auth.signOut();
        setSession(null);
      }

      async function refreshAll(activeSession = session, writeLogin = false) {
        setLoading(true);
        setErrors({});
        await Promise.all([loadFeed(), loadPosts(), loadProfiles(), loadLogins()]);
        if (writeLogin && activeSession?.user?.id) {
          await supabase.from('login_events').insert([{ user_id:activeSession.user.id, email:activeSession.user.email, user_agent:navigator.userAgent, event_type:'admin_login' }]);
          await loadLogins();
        }
        setLoading(false);
      }

      async function loadFeed() {
        try {
          const response = await fetch('data/feeds.json?ts=' + Date.now(), { cache:'no-store' });
          if (!response.ok) throw new Error('读取失败');
          setFeed(await response.json());
        } catch (error) {
          setErrors(prev => ({ ...prev, feed:'暂时无法读取信息流文件。' }));
        }
      }

      async function loadPosts() {
        const { data, error } = await supabase.from('posts').select('*').order('created_at', { ascending:false }).limit(80);
        if (error) setErrors(prev => ({ ...prev, posts:'无法读取社区帖子。请检查 posts 表和 RLS 策略。' }));
        else setPosts(data || []);
      }

      async function loadProfiles() {
        const { data, error } = await supabase.from('profiles').select('*').order('created_at', { ascending:false }).limit(100);
        if (error) setErrors(prev => ({ ...prev, profiles:'无法读取用户资料。请先运行 docs/admin-setup.sql，并把你的账号加入 admin_users。' }));
        else setProfiles(data || []);
      }

      async function loadLogins() {
        const { data, error } = await supabase.from('login_events').select('*').order('created_at', { ascending:false }).limit(100);
        if (error) setErrors(prev => ({ ...prev, logins:'无法读取登录记录。请先运行 docs/admin-setup.sql，并把你的账号加入 admin_users。' }));
        else setLogins(data || []);
      }

      const feedStats = useMemo(() => {
        const counts = feed?.counts || {};
        return [
          ['信息总数', counts.total || feed?.items?.length || 0],
          ['安全工程', counts.safety || 0],
          ['采矿工程', counts.mining || 0],
          ['地下空间', counts.underground || 0],
          ['招聘网站', counts.job || 0],
          ['经验/社媒', counts.social || 0]
        ];
      }, [feed]);

      function LoginView() {
        return <main className="min-h-screen flex items-center justify-center p-5"><section className="surface w-full max-w-md rounded-2xl p-6"><p className="text-sm font-bold text-blue-700">资安实习互助站</p><h1 className="mt-2 text-3xl font-extrabold">大白维护台</h1><p className="mt-3 text-sm text-slate-500 leading-relaxed">这里用于维护网站内容、查看用户资料和登录记录。请使用管理员邮箱登录；具体数据库配置见 <code>docs/admin-setup.sql</code>。</p><form onSubmit={signIn} className="mt-6 space-y-3"><input type="email" required value={email} onChange={e => setEmail(e.target.value)} placeholder="管理员邮箱" className="focus-ring w-full rounded-xl border border-slate-200 px-4 py-3 outline-none" /><button className="w-full rounded-xl bg-slate-900 px-5 py-3 font-bold text-white hover:bg-slate-700">发送登录链接</button></form>{message && <p className="mt-4 text-sm text-slate-600">{message}</p>}<a href="index.html" className="mt-5 inline-flex text-sm font-bold text-blue-700">返回同学页面</a></section></main>;
      }

      function Header() {
        return <header className="bg-white border-b border-slate-200 sticky top-0 z-40"><div className="shell flex h-16 items-center justify-between gap-4"><div><p className="font-extrabold">大白维护台</p><p className="text-xs text-slate-500">{session?.user?.email}</p></div><nav className="flex gap-2 overflow-x-auto">{[['overview','总览'],['profiles','用户资料'],['logins','登录记录'],['posts','社区帖子']].map(([id,label]) => <button key={id} onClick={() => setTab(id)} className={`h-16 px-2 sm:px-3 text-sm font-bold border-b-2 border-transparent whitespace-nowrap ${tab === id ? 'tab-active' : 'text-slate-500 hover:text-slate-900'}`}>{label}</button>)}</nav><div className="flex gap-2"><button onClick={() => refreshAll()} className="rounded-xl border border-slate-200 px-3 py-2 text-sm font-bold hover:bg-slate-50">刷新</button><button onClick={signOut} className="rounded-xl bg-slate-900 px-3 py-2 text-sm font-bold text-white hover:bg-slate-700">退出</button></div></div></header>;
      }

      function Stat({ label, value }) {
        return <div className="surface rounded-2xl p-5"><p className="text-sm text-slate-500">{label}</p><p className="mt-2 text-3xl font-extrabold">{value}</p></div>;
      }

      function ErrorBox() {
        const list = Object.values(errors).filter(Boolean);
        if (!list.length) return null;
        return <div className="rounded-2xl border border-amber-200 bg-amber-50 p-4 text-sm text-amber-900"><p className="font-extrabold mb-2">需要配置或检查的地方</p>{list.map(item => <p key={item}>· {item}</p>)}</div>;
      }

      function Overview() {
        return <div className="space-y-5"><div className="grid md:grid-cols-3 gap-4">{feedStats.map(([label,value]) => <Stat key={label} label={label} value={value} />)}</div><section className="surface rounded-2xl p-5"><h2 className="text-xl font-extrabold">维护提示</h2><div className="mt-3 grid md:grid-cols-3 gap-3 text-sm text-slate-600"><p className="rounded-xl bg-slate-50 p-3">同学页面只展示公开信息和原链接，不展示用户管理信息。</p><p className="rounded-xl bg-slate-50 p-3">用户资料和登录记录需要 Supabase RLS 保护，不能直接暴露在前端。</p><p className="rounded-xl bg-slate-50 p-3">如果数据没更新，可以到 GitHub Actions 手动运行 Update internship feeds。</p></div></section></div>;
      }

      function DataTable({ columns, rows, empty }) {
        return <div className="surface rounded-2xl overflow-hidden"><div className="overflow-x-auto"><table className="w-full text-sm"><thead className="bg-slate-50 text-left text-slate-500"><tr>{columns.map(col => <th key={col.key} className="px-4 py-3 font-bold whitespace-nowrap">{col.label}</th>)}</tr></thead><tbody>{rows.length === 0 ? <tr><td colSpan={columns.length} className="px-4 py-8 text-center text-slate-500">{empty}</td></tr> : rows.map((row, index) => <tr key={row.id || row.user_id || index} className="border-t border-slate-100">{columns.map(col => <td key={col.key} className="px-4 py-3 align-top text-slate-700 whitespace-nowrap">{col.render ? col.render(row) : (row[col.key] || '')}</td>)}</tr>)}</tbody></table></div></div>;
      }

      function Profiles() {
        return <DataTable empty="暂无用户资料。" rows={profiles} columns={[{ key:'email', label:'邮箱' }, { key:'display_name', label:'昵称' }, { key:'grade', label:'年级' }, { key:'major', label:'专业' }, { key:'created_at', label:'创建时间', render:r => r.created_at ? new Date(r.created_at).toLocaleString() : '' }, { key:'last_seen_at', label:'最近活跃', render:r => r.last_seen_at ? new Date(r.last_seen_at).toLocaleString() : '' }]} />;
      }

      function Logins() {
        return <DataTable empty="暂无登录记录。" rows={logins} columns={[{ key:'email', label:'邮箱' }, { key:'event_type', label:'事件' }, { key:'created_at', label:'时间', render:r => r.created_at ? new Date(r.created_at).toLocaleString() : '' }, { key:'user_agent', label:'设备信息', render:r => <span className="inline-block max-w-[420px] truncate">{r.user_agent || ''}</span> }]} />;
      }

      function Posts() {
        return <DataTable empty="暂无社区帖子。" rows={posts} columns={[{ key:'title', label:'标题', render:r => <span className="inline-block max-w-[320px] truncate font-bold">{r.title}</span> }, { key:'author', label:'作者' }, { key:'major', label:'专业' }, { key:'created_at', label:'发布时间', render:r => r.created_at ? new Date(r.created_at).toLocaleString() : '' }, { key:'content', label:'正文预览', render:r => <span className="inline-block max-w-[420px] truncate">{r.content || ''}</span> }]} />;
      }

      if (!session) return <LoginView />;

      return <div className="min-h-screen"><Header /><main className="shell py-8 space-y-5"><div className="flex items-end justify-between gap-4"><div><h1 className="text-3xl font-extrabold">维护总台</h1><p className="mt-2 text-sm text-slate-500">用于大白维护网站，不建议把这里当作同学公开页面。</p></div>{loading && <p className="text-sm text-slate-500">正在刷新...</p>}</div><ErrorBox />{tab === 'overview' && <Overview />}{tab === 'profiles' && <Profiles />}{tab === 'logins' && <Logins />}{tab === 'posts' && <Posts />}</main></div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
